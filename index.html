<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRI Sequence Simulator - Strict Physics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        .tab-btn.active { background-color: #1e293b; border-left-color: #3b82f6; color: #ffffff; }
    </style>
</head>
<body class="h-screen bg-slate-900 text-slate-300 font-sans flex flex-col overflow-hidden text-sm">

    <!-- HEADER -->
    <header class="bg-slate-950 border-b border-slate-800 p-3 flex justify-between items-center shrink-0 relative z-40">
        <div class="flex items-center gap-4">
            <div class="w-7 h-7 bg-blue-600 text-white font-bold flex items-center justify-center rounded-sm">S</div>
            <div>
                <h1 class="text-base font-bold text-slate-100 tracking-wide">MRI ENGINE - STRICT PHYSICS</h1>
                <p class="text-xs text-slate-500">Syngo Console Parameters & Bloch Ballistics</p>
            </div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden relative z-0">
        <!-- SIDEBAR TABS -->
        <aside class="w-48 bg-slate-950 border-r border-slate-800 flex flex-col shrink-0 overflow-y-auto" id="sidebar-tabs">
            <button class="tab-btn active p-3 text-left font-medium border-l-4 border-transparent text-slate-400 hover:bg-slate-800 transition-colors" data-target="routine">Routine</button>
            <button class="tab-btn p-3 text-left font-medium border-l-4 border-transparent text-slate-400 hover:bg-slate-800 transition-colors" data-target="contrast">Contrast</button>
            <button class="tab-btn p-3 text-left font-medium border-l-4 border-transparent text-slate-400 hover:bg-slate-800 transition-colors" data-target="resolution">Resolution</button>
            <button class="tab-btn p-3 text-left font-medium border-l-4 border-transparent text-slate-400 hover:bg-slate-800 transition-colors" data-target="geometry">Geometry</button>
            <button class="tab-btn p-3 text-left font-medium border-l-4 border-transparent text-slate-400 hover:bg-slate-800 transition-colors" data-target="physio">Physio</button>
            <button class="tab-btn p-3 text-left font-medium border-l-4 border-transparent text-slate-400 hover:bg-slate-800 transition-colors" data-target="sequence">Sequence</button>
            <button class="tab-btn p-3 text-left font-medium border-l-4 border-transparent text-blue-400 hover:bg-slate-800 transition-colors mt-auto border-t border-slate-800" data-target="setup">Setup</button>
        </aside>

        <!-- MAIN PANEL -->
        <main class="flex-1 overflow-y-auto p-4 flex flex-col xl:flex-row gap-4 bg-slate-900">
            <div class="flex-1 bg-slate-800 border border-slate-700 rounded-md p-4" id="parameters-container"></div>

            <!-- PHANTOM VIEWER (Basic structure per tenere in piedi l'interfaccia) -->
            <div class="w-full xl:w-96 flex flex-col gap-4 shrink-0">
                <div class="bg-black border border-slate-700 rounded-md p-4 flex flex-col items-center justify-center relative flex-1 min-h-[400px]">
                    <span id="phantom-title" class="absolute top-2 left-2 text-[10px] text-slate-500 uppercase tracking-widest z-10 bg-black/50 px-1 rounded">Phantom</span>
                    <div id="phantom-container" class="relative w-full aspect-square border border-slate-800 bg-black transition-all duration-300 overflow-hidden">
                        <svg viewBox="0 0 200 200" class="w-full h-full">
                            <rect id="ph-bg" x="0" y="0" width="200" height="200" fill="#111" />
                            <circle id="ph-tissue" cx="100" cy="100" r="80" fill="#444" />
                            <circle id="ph-fluid" cx="100" cy="100" r="30" fill="#888" />
                        </svg>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- BOTTOM DASHBOARD -->
    <footer class="bg-slate-950 border-t border-slate-800 p-3 shrink-0 relative z-10">
        <div class="flex flex-wrap md:flex-nowrap gap-2 max-w-full justify-between items-center text-center">
            <div class="bg-slate-900 border border-slate-700 px-3 py-2 rounded flex-1">
                <div class="text-[10px] text-slate-500 uppercase tracking-widest mb-1">Acq. Time (TA)</div>
                <div id="out-ta" class="font-mono text-lg text-slate-200">00:00</div>
            </div>
            <div class="bg-slate-900 border border-slate-700 px-3 py-2 rounded flex-1">
                <div class="text-[10px] text-slate-500 uppercase tracking-widest mb-1">ETL / Shots</div>
                <div id="out-etl" class="font-mono text-sm text-slate-200">-</div>
            </div>
            <div class="bg-slate-900 border border-slate-700 px-3 py-2 rounded flex-1">
                <div class="text-[10px] text-slate-500 uppercase tracking-widest mb-1">g-Factor / R</div>
                <div id="out-gfactor" class="font-mono text-sm text-slate-400">1.00</div>
            </div>
            <div class="bg-slate-900 border border-slate-700 px-3 py-2 rounded flex-[2]">
                <div class="text-[10px] text-slate-500 uppercase tracking-widest mb-1 flex justify-between">
                    <span>Res (dx × dy × dz)</span>
                    <span id="out-iso" class="font-bold text-slate-400">STATUS</span>
                </div>
                <div id="out-res" class="font-mono text-sm text-blue-300">0.0 × 0.0 × 0.0 mm</div>
            </div>
            <div class="bg-slate-900 border border-slate-700 px-3 py-2 rounded flex-1">
                <div class="text-[10px] text-slate-500 uppercase tracking-widest mb-1">SNR Base</div>
                <div id="out-snr-base" class="font-mono text-lg text-slate-400">0.00</div>
            </div>
            <div id="box-snr-final" class="border border-blue-500 bg-blue-900/20 px-4 py-2 rounded flex-1 transition-colors relative">
                <div class="text-[10px] text-blue-300 uppercase tracking-widest mb-1">SNR Final</div>
                <div id="out-snr-final" class="font-mono text-xl font-bold text-blue-400">0.00</div>
            </div>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
